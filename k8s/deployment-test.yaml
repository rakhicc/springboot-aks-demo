apiVersion: apps/v1
kind: Deployment
metadata:
  name: springboot-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: springboot-test
  template:
    metadata:
      labels:
        app: springboot-test
    spec:
      containers:
        - name: springboot-app
          image: rakhiacr12345.azurecr.io/springboot-aks-demo:v1
          ports:
            - containerPort: 8080

          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "test"

            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: db-secret-test
                  key: DB_USERNAME

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret-test
                  key: DB_PASSWORD

      imagePullSecrets:
        - name: acr-secret